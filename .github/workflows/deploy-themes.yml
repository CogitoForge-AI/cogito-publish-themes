# Build the theme gallery and deploy it to Cloudflare Workers with Wrangler.
#
# GitHub Actions builds the showcase site (the repo root is the Cogito Publish
# site) and `wrangler deploy` pushes ./dist to the "cogito-publish-themes"
# Worker (configured in wrangler.jsonc), served at
# publish-themes.cogito-ai.org. Cogito Publish is not on PyPI under this CLI
# name, so it is installed straight from its repo with `uv pip install` -- this
# gallery has no pyproject.toml of its own.
#
# Requires the same two repository secrets used by the docs deploy:
#   CLOUDFLARE_API_TOKEN   token with the "Edit Cloudflare Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  the account that owns the Worker
name: Deploy themes

# Re-deploy when the gallery site, any theme, or this workflow changes on main;
# manual dispatch stays available for ad-hoc deploys. The whole site is watched
# because the gallery embeds each theme's committed screenshots and links to its
# source.
on:
  push:
    branches: [main]
    paths:
      - "themes/**"
      - "content/**"
      - "layouts/**"
      - "pyssg.config.py"
      - "wrangler.jsonc"
      - ".github/workflows/deploy-themes.yml"
  workflow_dispatch:

# One deploy at a time; newer pushes supersede in-flight runs.
concurrency:
  group: deploy-themes
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      # Install Cogito Publish from its repo into a local venv -- no
      # pyproject.toml needed in this gallery repository.
      - name: Install Cogito Publish
        run: |
          uv venv
          uv pip install "git+https://github.com/CogitoForge-AI/cogito-publish.git"
      - name: Build site
        run: .venv/bin/cogito-publish build
      - uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # v4 is required to deploy a static-assets-only Worker (no `main`);
          # the action otherwise installs an older default that errors with
          # "Missing entry-point".
          wranglerVersion: "4.40.0"
          command: deploy
