# Build the theme gallery and deploy it with GitHub Pages Actions.
#
# GitHub Actions builds the showcase site at the repo root, uploads `./dist` as
# a Pages artifact, and deploys it to the repository's GitHub Pages
# environment. A `CNAME` file is written during the build job so the published
# site resolves at `publish-themes.cogito-ai.org`.
name: Deploy themes

# Re-deploy when the gallery site, any theme, or this workflow changes on main;
# manual dispatch stays available for ad-hoc deploys. The whole site is watched
# because the gallery embeds each theme's committed screenshots and links to its
# source.
on:
  push:
    branches: [main]
    paths:
      - "themes/**"
      - "content/**"
      - "layouts/**"
      - "pyssg.config.py"
      - ".github/workflows/deploy-themes.yml"
  workflow_dispatch:

# One deploy at a time; newer pushes supersede in-flight runs.
concurrency:
  group: deploy-themes
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
      # Install Cogito Publish from its repo into a local venv -- no
      # pyproject.toml needed in this gallery repository.
      - name: Install Cogito Publish
        run: |
          uv venv
          uv pip install "git+https://github.com/CogitoForge-AI/cogito-publish.git"
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - name: Build site
        run: |
          .venv/bin/cogito-publish build
          printf 'publish-themes.cogito-ai.org\n' > dist/CNAME
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Deploy site
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
