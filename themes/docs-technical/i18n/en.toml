# docs-technical theme UI strings (base language). A site overrides any key by
# shipping its own i18n/<lang>.toml at the site root.

[nav]
home = "Home"
tags = "Tags"
categories = "Categories"

[page]
reading_time = "{minutes} min read"
on_this_page = "On this page"
linked_from = "Linked from"
prev = "Previous"
next = "Next"

[term]
tagged = "{count} page(s) tagged."
