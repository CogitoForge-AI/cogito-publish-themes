name = "docs-technical"
version = "0.1.0"
default_template = "page.html.j2"

# Configurable theme options (theme configuration API, issue #53): defaults a
# site overrides via ``Config.theme`` and templates read as ``theme.<key>``.
[options]
# Initial color scheme: "auto" follows the OS preference; "light"/"dark" pin it.
default_theme = "auto"
# Primary accent color. This theme's stylesheet uses CSS custom properties, so
# the accent is a real runtime option (the template feeds it into ``--td-accent``).
accent = "#30638e"
# Optional heading shown above the sidebar navigation tree.
sidebar_title = "Documentation"
# Page chrome.
show_breadcrumbs = true
show_toc = true
show_prev_next = true
show_backlinks = true
show_reading_time = true
