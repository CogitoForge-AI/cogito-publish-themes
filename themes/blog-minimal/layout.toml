name = "blog-minimal"
version = "0.1.0"
default_template = "single.html.j2"

# Configurable theme options (theme configuration API, issue #53): defaults a
# site overrides via ``Config.theme`` and templates read as ``theme.<key>``.
# This theme is deliberately minimal, so the knob list is small. Colors are
# baked into the compiled stylesheet (coder defines them at SCSS build time),
# so there is no runtime ``accent`` option here.
[options]
# Initial color scheme: "auto" follows the OS preference; "light"/"dark" pin it.
default_theme = "auto"
# Show the light/dark toggle in the navigation.
show_theme_toggle = true
# Per-post chrome.
show_reading_time = true
show_tags = true
show_post_nav = true
# Table of contents on post pages (off by default to keep posts uncluttered).
show_toc = false
